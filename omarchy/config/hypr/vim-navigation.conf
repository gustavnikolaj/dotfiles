# Vim-style SUPER+HJKL navigation
#
# Mirrors the arrow-key bindings from omarchy's tiling-v2 defaults using
# vim directions instead. Arrow keys remain intact as alternatives.

# ── Unbind conflicts and relocate ────────────────────────────────────────────
# Free SUPER+{H,J,K,L} by moving the three bindings that occupy J, K, L.

unbind = SUPER, J           # was: toggle window split (tiling-v2)
unbind = SUPER, K           # was: show key bindings (utilities)
unbind = SUPER, L           # was: toggle workspace layout (tiling-v2)
unbind = SUPER, SLASH       # was: cycle monitor scaling (tiling-v2)
unbind = SUPER, Slash       # duplicate of above, but necessary since the bindings are case sensitive

bindd = SUPER, Y, Toggle window split, layoutmsg, togglesplit
bindd = SUPER, U, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle
bindd = SUPER, SLASH, Show key bindings, exec, omarchy-menu-keybindings

# SUPER+SLASH reassigns "show key bindings" (from SUPER+K) and displaces
# "cycle monitor scaling" from the defaults — monitor scaling is dropped.
#
# SUPER CTRL+L (lock screen) is NOT unbound. It would only need relocation
# if the commented-out group navigation extension below is ever enabled.

# ── Focus movement ───────────────────────────────────────────────────────────

bindd = SUPER, H, Move focus left,  movefocus, l
bindd = SUPER, J, Move focus down,  movefocus, d
bindd = SUPER, K, Move focus up,    movefocus, u
bindd = SUPER, L, Move focus right, movefocus, r

# ── Window swapping ──────────────────────────────────────────────────────────

bindd = SUPER SHIFT, H, Swap window left,  swapwindow, l
bindd = SUPER SHIFT, J, Swap window down,  swapwindow, d
bindd = SUPER SHIFT, K, Swap window up,    swapwindow, u
bindd = SUPER SHIFT, L, Swap window right, swapwindow, r

# ── Extensions (commented out) ───────────────────────────────────────────────
# These mirror additional arrow-key bindings from tiling-v2 defaults but are
# not enabled because they would introduce extra conflicts.

# Move into group (mirrors SUPER ALT+arrows)
# bindd = SUPER ALT, H, Move into group left,  movewindoworgroup, l
# bindd = SUPER ALT, J, Move into group down,  movewindoworgroup, d
# bindd = SUPER ALT, K, Move into group up,    movewindoworgroup, u
# bindd = SUPER ALT, L, Move into group right, movewindoworgroup, r

# Move workspace to monitor (mirrors SUPER SHIFT ALT+arrows)
# bindd = SUPER SHIFT ALT, H, Move workspace to monitor left,  movecurrentworkspacetomonitor, l
# bindd = SUPER SHIFT ALT, J, Move workspace to monitor down,  movecurrentworkspacetomonitor, d
# bindd = SUPER SHIFT ALT, K, Move workspace to monitor up,    movecurrentworkspacetomonitor, u
# bindd = SUPER SHIFT ALT, L, Move workspace to monitor right, movecurrentworkspacetomonitor, r

# Group navigation (mirrors SUPER CTRL+LEFT/RIGHT)
# Note: enabling this requires relocating SUPER CTRL+L (lock screen).
# bindd = SUPER CTRL, H, Previous in group, changegroupactive, b
# bindd = SUPER CTRL, L, Next in group, changegroupactive, f
